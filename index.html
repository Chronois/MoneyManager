<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Manager</title>
<meta name="description" content="Dasbor pengelola keuangan pribadi — pemasukan, pengeluaran, saldo, dan anggaran per kategori.">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="paper-texture"></div>
<div id="app">

  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 012-2h13a1 1 0 011 1v2M3 7v10a2 2 0 002 2h14a1 1 0 001-1V9a1 1 0 00-1-1H5a2 2 0 01-2-2z"/><circle cx="16" cy="14" r="1.4"/></svg>
      </div>
      <div class="brand-text">
        <h1>Money Manager</h1>
        <p>Buku besar keuangan pribadi</p>
      </div>
      <button class="icon-btn theme-btn" id="btnThemeToggle" title="Toggle Dark/Light Mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="btnExport" title="Ekspor data (.json)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg></button>
      <button class="icon-btn" id="btnImport" title="Impor data (.json)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V9m0 0l-4 4m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg></button>
      <button class="icon-btn" id="btnReset" title="Reset ke data contoh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0115.36-6.36M21 12a9 9 0 01-15.36 6.36"/><path d="M3 4v5h5M21 20v-5h-5"/></svg></button>
      <input type="file" id="importFileInput" accept="application/json" hidden>
    </div>
  </header>

  <nav class="tab-nav-wrap"><div class="tab-nav" id="tabNav"></div></nav>

  <main>
    <section class="view" id="view-dashboard"></section>
    <section class="view" id="view-transactions"></section>
    <section class="view" id="view-balance"></section>
    <section class="view" id="view-budgets"></section>
    <section class="view" id="view-categories"></section>
    <section class="view" id="view-accounts"></section>
  </main>

  <footer>Money Manager · data tersimpan lokal di perangkatmu</footer>
</div>

<div class="modal-overlay" id="txnModalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="txnModalTitle">Tambah Transaksi</h3>
      <button class="icon-btn" id="btnTxnClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="type-toggle">
        <button type="button" data-type="expense" class="active">Pengeluaran</button>
        <button type="button" data-type="income">Pemasukan</button>
        <button type="button" data-type="transfer">Transfer</button>
      </div>
      <div class="form-row">
        <div class="field"><label>Tanggal</label><input type="date" class="input" id="txnDate"></div>
        <div class="field"><label>Akun</label><select class="input" id="txnAccount"></select></div>
      </div>
      <div class="form-row" id="rowCategory">
        <div class="field"><label>Kategori</label><select class="input" id="txnCategory"></select></div>
        <div class="field"><label>Subkategori</label><select class="input" id="txnSubcategory"></select></div>
      </div>
      <div class="form-row" id="rowTransfer" style="display:none">
        <div class="field"><label>Transfer Ke</label><select class="input" id="txnTransferTo"></select></div>
      </div>
      <div class="field"><label>Catatan</label><input type="text" class="input" id="txnNote" placeholder="cth. Makan siang"></div>
      <div class="field"><label id="amountLabel">Jumlah</label><input type="number" class="input" id="txnAmount" placeholder="0" min="0"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="btnTxnCancel">Batal</button>
      <button class="btn btn-primary" id="btnTxnSave">Simpan</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="acctModalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="acctModalTitle">Tambah Akun</h3>
      <button class="icon-btn" id="btnAcctClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Nama Akun</label><input type="text" class="input" id="acctName" placeholder="cth. Dompet Utama"></div>
      <div class="form-row">
        <div class="field"><label>Jenis</label>
          <select class="input" id="acctType">
            <option value="bank">Bank</option>
            <option value="digital">Bank Digital</option>
            <option value="ewallet">E-Wallet</option>
            <option value="cash">Tunai</option>
          </select>
        </div>
        <div class="field"><label>Saldo Saat Ini</label><input type="number" class="input" id="acctBalance" placeholder="0"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="btnAcctCancel">Batal</button>
      <button class="btn btn-primary" id="btnAcctSave">Simpan</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="budgetModalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="budgetModalTitle">Tambah Anggaran</h3>
      <button class="icon-btn" id="btnBudgetClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="field"><label>Kategori</label><select class="input" id="budgetCategory"></select></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Subkategori</label><select class="input" id="budgetSubcategory"></select></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Batas Anggaran Bulanan</label><input type="number" class="input" id="budgetAmount" placeholder="cth. 500000" min="0"></div>
      </div>
      <input type="hidden" id="budgetOldKey">
    </div>
    <div class="modal-foot">
      <button class="btn" id="btnBudgetCancel">Batal</button>
      <button class="btn btn-primary" id="btnBudgetSave">Simpan</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="catModalOverlay">
  <div class="modal" style="overflow: visible;">
    <div class="modal-head">
      <h3 id="catModalTitle">Tambah Kategori</h3>
      <button class="icon-btn" id="btnCatClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body" style="overflow: visible;">
      <div class="field"><label>Nama Kategori</label><input type="text" class="input" id="catName" placeholder="cth. Belanja"></div>
      <div class="form-row">
        <div class="field">
          <label>Tipe Kategori</label>
          <select class="input" id="catType">
            <option value="expense">Pengeluaran (Expense)</option>
            <option value="income">Pemasukan (Income)</option>
            <option value="both">Keduanya (Both)</option>
          </select>
        </div>
        <div class="field">
          <label>Ikon</label>
          <div class="emoji-dropdown-wrap">
            <button type="button" class="input emoji-selector-btn" id="btnCatIcon">📁</button>
            <input type="hidden" id="catIconValue" value="📁">
            <div class="emoji-popover" id="catEmojiPopover">
              <div class="recent-emojis-wrap">
                <div class="recent-emojis-title">Terakhir</div>
                <div class="recent-emojis-list" id="catRecentList"></div>
              </div>
              <div id="catPickerContainer"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="btnCatCancel">Batal</button>
      <button class="btn btn-primary" id="btnCatSave">Simpan</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="subModalOverlay">
  <div class="modal" style="overflow: visible;">
    <div class="modal-head">
      <h3 id="subModalTitle">Tambah Subkategori</h3>
      <button class="icon-btn" id="btnSubClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body" style="overflow: visible;">
      <div class="field"><label>Nama Subkategori</label><input type="text" class="input" id="subName" placeholder="cth. Groceries"></div>
      <div class="field">
        <label>Ikon Subkategori</label>
        <div class="emoji-dropdown-wrap">
          <button type="button" class="input emoji-selector-btn" id="btnSubIcon">📁</button>
          <input type="hidden" id="subIconValue" value="📁">
          <div class="emoji-popover" id="subEmojiPopover">
            <div class="recent-emojis-wrap">
              <div class="recent-emojis-title">Terakhir</div>
              <div class="recent-emojis-list" id="subRecentList"></div>
            </div>
            <div id="subPickerContainer"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="btnSubCancel">Batal</button>
      <button class="btn btn-primary" id="btnSubSave">Simpan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
<script src="app.js"></script>
</body>
</html>
